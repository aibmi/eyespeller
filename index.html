<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>100% Stable Consonant Synth Speller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: -apple-system, sans-serif; background: #000000; color: #ffffff; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; overflow: hidden; }
        #preview-box { width: 100%; padding: 20px; font-size: 36px; font-weight: bold; background: #1c1c1e; color: #ffffff; text-align: left; border-radius: 12px; min-height: 80px; box-sizing: border-box; border: 2px solid #2c2c2e; margin-bottom: 15px; word-wrap: break-word; }
        #matrix { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; flex-grow: 1; }
        .grid-button { background: #1c1c1e; color: #ffffff; border: 3px solid #2c2c2e; border-radius: 16px; display: flex; justify-content: center; align-items: center; font-size: 26px; font-weight: bold; transition: all 0.05s; }
        .active-focus { border-color: #30d158 !important; background: #1c3d22 !important; box-shadow: 0 0 15px #30d158; }
        .trigger-flash { background: #30d158 !important; color: #000000 !important; }
        #video-container { position: absolute; bottom: 10px; right: 10px; width: 100px; height: 75px; border-radius: 8px; overflow: hidden; border: 3px solid #ff3b30; opacity: 0.8; z-index: 9999; background: #222; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    </style>
</head>
<body>

    <div id="preview-box">＿</div>
    <div id="matrix"></div>
    
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted crossorigin="anonymous"></video>
    </div>
<script>
let trackingReady = false; 
let cameraUnlocked = false;
let cooldownActive = false; 
let globalAudioCtx = null; 

// --- UNFREEZABLE RENDER-LOOP REFRESH ENGINE ---
const FIVE_MINUTES = 5 * 60 * 1000;
const TWENTY_FOUR_HOURS = 24 * 60 * 60 * 1000;
let lastRefreshCheckTime = Date.now();

let startTime = localStorage.getItem('bluefy_refresh_start');
if (!startTime) {
    startTime = Date.now();
    localStorage.setItem('bluefy_refresh_start', startTime);
    setTimeout(() => { window.location.reload(); }, 2000);
}

function processActiveUnfreezableRefresh() {
    const NOW = Date.now();
    if (NOW - startTime >= TWENTY_FOUR_HOURS) {
        localStorage.removeItem('bluefy_refresh_start');
        return; 
    }
    if (NOW - lastRefreshCheckTime >= FIVE_MINUTES) {
        window.location.reload();
    }
}

const characterTree = [
    { name: "あ行", items: ["あ", "い", "う", "え", "お", "前"] },
    { name: "か行", items: ["か", "き", "く", "け", "こ", "が", "ぎ", "ぐ", "げ", "ご", "前"] },
    { name: "さ行", items: ["さ", "し", "す", "せ", "そ", "ざ", "じ", "ず", "ぜ", "ぞ", "前"] },
    { name: "た行", items: ["た", "ち", "つ", "て", "と", "だ", "ぢ", "づ", "で", "ど", "前"] },
    { name: "な行", items: ["な", "に", "ぬ", "ね", "の", "前"] },
    { name: "は行", items: ["は", "ひ", "ふ", "へ", "ほ", "ば", "び", "ぶ", "べ", "ぼ", "ぱ", "ぴ", "ぷ", "ぺ", "ぽ", "前"] },
    { name: "ま行", items: ["ま", "み", "む", "め", "も", "前"] },
    { name: "や行", items: ["や", "ゆ", "よ", "前"] },
    { name: "ら行", items: ["ら", "り", "る", "れ", "ろ", "前"] },
    { name: "わ行", items: ["わ", "を", "ん", "ゃ", "ゅ", "ょ", "っ", "前"] },
    { name: "メニュー", items: ["スペース", "読み上げ", "おねがい", "一文字消去", "全消去", "休止モード", "前"] }
];

let constructedString = "";
let currentTier = 1; 
let activeRowIndex = 0;
let activeColIndex = 0;
let loopInterval = null;
let isBroadcasting = false;
let isSleeping = false;
let video, canvas, ctx;
let prevFrameData = null;
let motionTriggered = false;

const previewDOM = document.getElementById("preview-box");
const matrixDOM = document.getElementById("matrix");
const videoContainerDOM = document.getElementById("video-container");

function initializeHardwareAudio() {
    if (!globalAudioCtx) {
        globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playBlinkConfirmationSound() {
    try {
        initializeHardwareAudio();
        if (globalAudioCtx.state === 'suspended') { globalAudioCtx.resume(); }
        const oscillator = globalAudioCtx.createOscillator();
        const gainNode = globalAudioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, globalAudioCtx.currentTime); 
        gainNode.gain.setValueAtTime(0.15, globalAudioCtx.currentTime); 
        gainNode.gain.exponentialRampToValueAtTime(0.001, globalAudioCtx.currentTime + 0.12);
        oscillator.connect(gainNode);
        gainNode.connect(globalAudioCtx.destination);
        oscillator.start();
        oscillator.stop(globalAudioCtx.currentTime + 0.12);
    } catch (e) {}
}

function buildTier1UI() {
    matrixDOM.innerHTML = "";
    matrixDOM.style.gridTemplateColumns = "repeat(4, 1fr)";
    characterTree.forEach((row, index) => {
        let btn = document.createElement("div");
        btn.className = "grid-button";
        btn.id = `cell-${index}`;
        btn.innerText = row.name;
        matrixDOM.appendChild(btn);
    });
    updateFocusVisuals();
}
function buildTier2UI(rowIndex) {
    matrixDOM.innerHTML = "";
    const activeRowItems = characterTree[rowIndex].items;
    matrixDOM.style.gridTemplateColumns = activeRowItems.length > 6 ? "repeat(4, 1fr)" : "repeat(3, 1fr)";
    activeRowItems.forEach((item, index) => {
        let btn = document.createElement("div");
        btn.className = "grid-button";
        btn.id = `cell-${index}`;
        btn.innerText = item;
        matrixDOM.appendChild(btn);
    });
    updateFocusVisuals();
}

function updateFocusVisuals() {
    document.querySelectorAll(".grid-button").forEach(el => el.classList.remove("active-focus"));
    let activeId = currentTier === 1 ? `cell-${activeRowIndex}` : `cell-${activeColIndex}`;
    let targetElement = document.getElementById(activeId);
    if (targetElement) targetElement.classList.add("active-focus");
}

function startMasterScanLoop() {
    if (loopInterval) clearInterval(loopInterval);
    loopInterval = setInterval(() => {
        if (isBroadcasting || isSleeping || !trackingReady) return;
        if (currentTier === 1) {
            activeRowIndex = (activeRowIndex + 1) % characterTree.length;
        } else {
            const maxCols = characterTree[activeRowIndex].items.length;
            activeColIndex = (activeColIndex + 1) % maxCols;
        }
        updateFocusVisuals();
    }, 4500); 
}

function executeSelectionAction() {
    if (isBroadcasting || !trackingReady || cooldownActive) return;
    
    cooldownActive = true; 
    videoContainerDOM.style.borderColor = "#ff3b30"; 
    
    let targetId = currentTier === 1 ? `cell-${activeRowIndex}` : `cell-${activeColIndex}`;
    let targetElement = document.getElementById(targetId);
    if (targetElement) targetElement.classList.add("trigger-flash");
    
    playBlinkConfirmationSound(); 

    setTimeout(() => {
        if (currentTier === 1) {
            currentTier = 2;
            activeColIndex = 0;
            buildTier2UI(activeRowIndex);
        } else {
            const selectedItem = characterTree[activeRowIndex].items[activeColIndex];
            processSelection(selectedItem);
        }
    }, 150);

    setTimeout(() => {
        cooldownActive = false;
        if (cameraUnlocked) videoContainerDOM.style.borderColor = "#007aff";
    }, 2500);
}

function processSelection(value) {
    if (value === "前") { returnToTier1(); return; }
    if (activeRowIndex === 10) { 
        switch(value) {
            case "スペース": constructedString += " "; break;
            case "一文字消去": constructedString = constructedString.slice(0, -1); break;
            case "全消去": constructedString = ""; break;
            case "読み上げ": playSplicedConsonantSpeech(constructedString); break; 
            case "おねがい": 
                constructedString += "お願いします";
                previewDOM.innerText = constructedString + "＿";
                playSplicedConsonantSpeech("お願いします"); 
                break;
            case "休止モード": enterSleepState(); return;
        }
    } else { constructedString += value; }
    previewDOM.innerText = constructedString == "" ? "＿" : constructedString + "＿";
    returnToTier1();
}

function returnToTier1() { currentTier = 1; buildTier1UI(); }
function playSplicedConsonantSpeech(text) {
    if (!text || text.trim() === "") return;
    isBroadcasting = true;
    initializeHardwareAudio();
    if (globalAudioCtx.state === 'suspended') { globalAudioCtx.resume(); }

    let timeOffset = globalAudioCtx.currentTime;

    const syllablesMap = {
        "あ": {vow: 135, con: 0},   "か": {vow: 140, con: 1},   "さ": {vow: 145, con: 2},   "た": {vow: 150, con: 3},   "な": {vow: 155, con: 0},
        "は": {vow: 160, con: 4},   "ま": {vow: 165, con: 0},   "や": {vow: 170, con: 0},   "ら": {vow: 175, con: 0},   "わ": {vow: 180, con: 0},
        "い": {vow: 250, con: 0},   "き": {vow: 255, con: 1},   "し": {vow: 260, con: 2},   "ち": {vow: 265, con: 3},   "に": {vow: 270, con: 0},
        "ひ": {vow: 275, con: 4},   "み": {vow: 280, con: 0},   "り": {vow: 290, con: 0},
        "う": {vow: 110, con: 0},   "く": {vow: 115, con: 1},   "す": {vow: 120, con: 2},   "つ": {vow: 125, con: 3},   "ぬ": {vow: 130, con: 0},
        "ふ": {vow: 105, con: 4},   "む": {vow: 112, con: 0},   "ゆ": {vow: 118, con: 0},   "る": {vow: 122, con: 0},   "ん": {vow: 95,  con: 0},
        "え": {vow: 190, con: 0},   "け": {vow: 195, con: 1},   "せ": {vow: 200, con: 2},   "て": {vow: 205, con: 3},   "ね": {vow: 210, con: 0},
        "へ": {vow: 215, con: 4},   "め": {vow: 220, con: 0},   "れ": {vow: 230, con: 0},
        "お": {vow: 125, con: 0},   "こ": {vow: 128, con: 1},   "そ": {vow: 132, con: 2},   "と": {vow: 136, con: 3},   "の": {vow: 142, con: 0},
        "ほ": {vow: 146, con: 4},   "も": {vow: 152, con: 0},   "よ": {vow: 158, con: 0},   "ろ": {vow: 164, con: 0},   "を": {vow: 125, con: 0}
    };

    let noiseBufferSize = globalAudioCtx.sampleRate * 0.08; 
    let noiseBuffer = globalAudioCtx.createBuffer(1, noiseBufferSize, globalAudioCtx.sampleRate);
    let noiseOutput = noiseBuffer.getChannelData(0);
    for (let i = 0; i < noiseBufferSize; i++) {
        noiseOutput[i] = Math.random() * 2 - 1;
    }

    for (let char of text) {
        let nodeData = syllablesMap[char] || {vow: 150, con: 0};
        
        if (nodeData.con > 0) {
            let noiseNode = globalAudioCtx.createBufferSource();
            let noiseFilter = globalAudioCtx.createBiquadFilter();
            let noiseGain = globalAudioCtx.createGain();
            noiseNode.buffer = noiseBuffer;
            noiseGain.gain.setValueAtTime(0, timeOffset);
            
            if (nodeData.con === 1) { 
                noiseFilter.type = 'bandpass'; noiseFilter.frequency.setValueAtTime(1200, timeOffset);
                noiseGain.gain.linearRampToValueAtTime(0.25, timeOffset + 0.01);
            } else if (nodeData.con === 2) { 
                noiseFilter.type = 'highpass'; noiseFilter.frequency.setValueAtTime(6000, timeOffset);
                noiseGain.gain.linearRampToValueAtTime(0.18, timeOffset + 0.02);
            } else if (nodeData.con === 3) { 
                noiseFilter.type = 'bandpass'; noiseFilter.frequency.setValueAtTime(800, timeOffset);
                noiseGain.gain.linearRampToValueAtTime(0.35, timeOffset + 0.005);
            } else if (nodeData.con === 4) { 
                noiseFilter.type = 'lowpass'; noiseFilter.frequency.setValueAtTime(2500, timeOffset);
                noiseGain.gain.linearRampToValueAtTime(0.14, timeOffset + 0.03);
            }
            
            noiseGain.gain.exponentialRampToValueAtTime(0.001, timeOffset + 0.07);
            noiseNode.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(globalAudioCtx.destination);
            noiseNode.start(timeOffset); noiseNode.stop(timeOffset + 0.08);
        }

        const oscCore = globalAudioCtx.createOscillator();
        const oscBlend = globalAudioCtx.createOscillator();
        const vocalGain = globalAudioCtx.createGain();
        
        oscCore.type = 'sawtooth'; oscCore.frequency.setValueAtTime(nodeData.vow, timeOffset + 0.03);
        oscBlend.type = 'triangle'; oscBlend.frequency.setValueAtTime(nodeData.vow * 2, timeOffset + 0.03);
        
        vocalGain.gain.setValueAtTime(0, timeOffset);
        vocalGain.gain.linearRampToValueAtTime(0.12, timeOffset + 0.06); 
        vocalGain.gain.exponentialRampToValueAtTime(0.001, timeOffset + 0.28); 
        
        oscCore.connect(vocalGain); oscBlend.connect(vocalGain); vocalGain.connect(globalAudioCtx.destination);
        oscCore.start(timeOffset); oscBlend.start(timeOffset);
        oscCore.stop(timeOffset + 0.32); oscBlend.stop(timeOffset + 0.32);
        
        timeOffset += 0.36; 
    }

    setTimeout(() => { isBroadcasting = false; }, (text.length * 360) + 100);
}

function enterSleepState() {
    isSleeping = true;
    matrixDOM.innerHTML = "<div class='grid-button active-focus' id='sleep-btn' style='grid-column: span 4; background: #000; border-color: #222; color: #555;'>💤 休止中 (首を振って再開)</div>";
}

function exitSleepState() { isSleeping = false; returnToTier1(); }

async function setupWebcam() {
    video = document.getElementById('webcam');
    canvas = document.createElement('canvas');
    ctx = canvas.getContext('2d');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 160, height: 120 } });
        video.srcObject = stream;
        video.setAttribute('playsinline', 'true');
        video.setAttribute('webkit-playsinline', 'true');
        video.addEventListener('loadedmetadata', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            video.muted = true;
            video.play().catch(() => { video.muted = false; video.play(); });
            setTimeout(() => { trackingReady = true; }, 6000);
            requestAnimationFrame(analyzePixelsLoop);
        });
    } catch (err) {}
}

function analyzePixelsLoop() {
    if (!video || video.paused || video.ended) { requestAnimationFrame(analyzePixelsLoop); return; }
    processActiveUnfreezableRefresh();
    try {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        if (prevFrameData === null) {
            prevFrameData = new Uint8ClampedArray(data);
            requestAnimationFrame(analyzePixelsLoop);
            return;
        }
        let lateralShiftPixels = 0;
        let totalChecked = 0;
        let w = canvas.width;
        let h = canvas.height;
        for (let y = 4; y < h - 4; y += 4) {
            for (let x = 8; x < w - 8; x += 4) {
                let idx = (y * w + x) * 4;
                let currentCenter = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                let prevLeftNeighbor = (prevFrameData[idx - 8] + prevFrameData[idx - 7] + prevFrameData[idx - 6]) / 3;
                let prevRightNeighbor = (prevFrameData[idx + 8] + prevFrameData[idx + 9] + prevFrameData[idx + 10]) / 3;
                if ((Math.abs(currentCenter - prevLeftNeighbor) < 6 || Math.abs(currentCenter - prevRightNeighbor) < 6) && Math.abs(data[idx] - prevFrameData[idx]) > 8) {
                    lateralShiftPixels++;
                }
                totalChecked++;
            }
        }
        let lateralMotionRatio = (lateralShiftPixels / totalChecked) * 100;
        if (lateralMotionRatio > 0.1 && !cameraUnlocked) {
            cameraUnlocked = true;
            if (!cooldownActive) videoContainerDOM.style.borderColor = "#007aff";
            initializeHardwareAudio(); 
        }
        if (lateralMotionRatio > 0.5 && cameraUnlocked && !cooldownActive) { 
            if (!motionTriggered && trackingReady) {
                motionTriggered = true; 
                if (isSleeping) { exitSleepState(); } else { executeSelectionAction(); }
            }
        } else if (lateralMotionRatio < 0.2) { motionTriggered = false; }
        for (let i = 0; i < data.length; i++) { prevFrameData[i] = data[i]; }
    } catch (e) {}
    requestAnimationFrame(analyzePixelsLoop);
}

buildTier1UI();
startMasterScanLoop();
setupWebcam();
</script>
</body>
</html>
